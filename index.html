<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>会社案内AR - 読み込み改善版</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #28a745; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
        }
        #web-link-button {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 5000; padding: 15px 30px; background-color: #ff4757; color: white;
            border: none; border-radius: 8px; font-size: 18px; font-weight: bold;
            text-decoration: none; opacity: 0; transition: opacity 0.5s;
            pointer-events: none;
        }
        #web-link-button.visible { opacity: 1; pointer-events: auto; }
        #ui-guide {
            position: fixed; top: 20px; left: 0; width: 100%; text-align: center;
            color: white; z-index: 1000; font-size: 16px; pointer-events: none;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button id="start-button" onclick="startAR()">ARカメラを起動する</button>
    <div id="ui-guide" class="hidden">写真を枠内に収めてください</div>
    <a id="web-link-button" href="https://www.google.co.jp/" target="_blank">詳細はこちら</a>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        embedded renderer="colorManagement: false, precision: medium" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
        
        <a-assets>
            <video id="introVideo" src="./intro_video.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" 
                   muted playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
            <a-video id="ar-video-obj" src="#introVideo" position="0 0 0" height="0.75" width="1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const videoEl = document.querySelector("#introVideo");
        const webButton = document.querySelector("#web-link-button");
        const targetEl = document.querySelector('#target-entity');
        const uiGuide = document.querySelector("#ui-guide");
        const startButton = document.querySelector("#start-button");

        function startAR() {
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];

            // エラーチェック: arSystemが存在するか
            if (!arSystem) {
                alert("ARエンジンの読み込みに失敗しました。ページを更新してください。");
                return;
            }

            startButton.classList.add("hidden");
            uiGuide.classList.remove("hidden");

            // カメラ起動
            arSystem.start();
            
            // 動画を「準備完了」にするための処理
            videoEl.play().then(() => {
                videoEl.pause();
                videoEl.muted = false;
            }).catch(e => console.log("Init play muted", e));
        }

        // 認識イベント
        targetEl.addEventListener("targetFound", () => {
            console.log("Target Found!");
            uiGuide.classList.add("hidden");
            videoEl.play();
        });

        // 5秒経過でボタン表示
        videoEl.addEventListener('timeupdate', () => {
            if (videoEl.currentTime >= 5) {
                webButton.classList.add("visible");
            }
        });

        targetEl.addEventListener("targetLost", () => {
            videoEl.pause();
        });
        
        // エラーハンドリング: .mindファイルの読み込み失敗を検知
        document.querySelector('a-scene').addEventListener("AR_ERROR", (event) => {
            alert("ARエラー: 画像データ（.mind）が読み込めませんでした。");
        });
    </script>
</body>
</html>
