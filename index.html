<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>会社案内AR - 最終安定版</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; padding: 20px 40px; background: #28a745; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #web-link-button {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 3000; padding: 18px 35px; background-color: #ff4757; color: white;
            border: none; border-radius: 8px; font-size: 18px; font-weight: bold;
            text-decoration: none; text-align: center; opacity: 0; 
            transition: opacity 0.5s; pointer-events: none;
        }
        #web-link-button.visible { opacity: 1; pointer-events: auto; }
        #ui-guide {
            position: fixed; top: 30px; left: 0; width: 100%; text-align: center;
            color: white; z-index: 1000; font-size: 16px; text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button id="start-button" onclick="startAR()">ARカメラを起動する</button>
    <div id="ui-guide" class="hidden">写真を枠内に収めてください</div>
    <a id="web-link-button" href="https://www.google.co.jp/" target="_blank">もっと詳しく見る</a>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        embedded color-space="sRGB" renderer="colorManagement: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
        
        <a-assets>
            <video id="introVideo" src="./intro_video.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" 
                   playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
            <a-video id="ar-video-obj" src="#introVideo" position="0 0 0" height="0.75" width="1" transparent="false"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const videoEl = document.querySelector("#introVideo");
        const webButton = document.querySelector("#web-link-button");
        const targetEl = document.querySelector('#target-entity');
        const uiGuide = document.querySelector("#ui-guide");
        const startButton = document.querySelector("#start-button");

        function startAR() {
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];

            // 1. ボタンを消して案内を出す
            startButton.classList.add("hidden");
            uiGuide.classList.remove("hidden");

            // 2. ブラウザの「再生許可」を得るために、無音で再生開始
            videoEl.play().then(() => {
                console.log("Video playback started successfully");
                // 3. 動画が動き出してからARエンジンを起動
                arSystem.start();
            }).catch(err => {
                console.error("Video play failed:", err);
                // 失敗してもARだけは起動させる
                arSystem.start();
            });
        }

        // 動画の再生時間を監視
        videoEl.addEventListener('timeupdate', () => {
            // 5秒経過したらボタンを表示
            if (videoEl.currentTime >= 5) {
                webButton.classList.add("visible");
            }
        });

        // 写真が見つかった時
        targetEl.addEventListener("targetFound", () => {
            uiGuide.classList.add("hidden");
            videoEl.muted = false; // 音声を出す
            videoEl.play();
        });

        // 写真を見失った時
        targetEl.addEventListener("targetLost", () => {
            videoEl.pause();
        });
    </script>
</body>
</html>
